<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F4EBD9" />
    <meta name="description" content="로기 — 아무 일 없는 보통의 하루를 채집·세공하는 게임화 아카이빙" />
    <title>유로그 · Ulog</title>
    <style>
      html, body { margin: 0; padding: 0; background: #F4EBD9; height: 100%; }
      #boot-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
        background: #F4EBD9; color: #5A4A32; font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
        z-index: 99999;
      }
      #boot-splash .logo { font-size: 24px; font-weight: 800; letter-spacing: 0.04em; }
      #boot-splash .sub  { font-size: 12px; color: rgba(86,74,50,0.6); }
      #boot-splash .dots { display: flex; gap: 6px; }
      #boot-splash .dots span {
        width: 8px; height: 8px; border-radius: 50%; background: #A0BCA8;
        animation: bootDot 1.2s ease-in-out infinite;
      }
      #boot-splash .dots span:nth-child(2) { animation-delay: 0.15s; }
      #boot-splash .dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes bootDot { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.1); } }
      @keyframes bootFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      #boot-splash .ghost { animation: bootFloat 2.2s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">
        <svg class="ghost" width="72" height="84" viewBox="0 0 72 84" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <ellipse cx="36" cy="74" rx="22" ry="4" fill="rgba(86,74,50,0.12)" />
          <path d="M36 8 C18 8 10 22 10 38 L10 64 C10 68 14 70 18 66 L24 60 L30 66 L36 60 L42 66 L48 60 L54 66 C58 70 62 68 62 64 L62 38 C62 22 54 8 36 8 Z"
                fill="#FBF6E8" stroke="#DDB77A" stroke-width="1.5" />
          <circle cx="28" cy="36" r="2.5" fill="#5A4A32" />
          <circle cx="44" cy="36" r="2.5" fill="#5A4A32" />
          <path d="M30 46 Q36 50 42 46" stroke="#5A4A32" stroke-width="1.5" fill="none" stroke-linecap="round" />
        </svg>
        <div class="logo">로기</div>
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="sub">잠시만요</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
