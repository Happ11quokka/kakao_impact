# Railway Nixpacks 가 Python 3.12 를 선택하도록 지정.
# 기본 railpack+mise 빌더는 python 을 floating(최신 패치)으로 잡는데, 신규 패치
# (예: 3.13.14)의 precompiled 바이너리가 아직 안 올라오면 빌드가 깨진다.
# NIXPACKS + nixpkgs python312 로 고정해 그 의존을 우회한다(backend 와 동일 전략).
# python-version 파일이 있어도 일부 빌더가 무시하므로 이중 잠금.
[variables]
NIXPACKS_PYTHON_VERSION = "3.12"

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
