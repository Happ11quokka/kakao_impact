# Railway Nixpacks 가 Python 3.12 를 선택하도록 지정.
# python-version 파일이 있어도 일부 빌더가 이를 무시하므로 이중 잠금.
[variables]
NIXPACKS_PYTHON_VERSION = "3.12"

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = "python migrate.py && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
